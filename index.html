<script>
// ─────────────────────────────────────────────────────────────────
//  STEP 1: Dynamically load Firebase SDKs, then boot the app
//  This prevents "Can't find variable: firebase" on iOS Safari
// ─────────────────────────────────────────────────────────────────
function loadScript(src) {
    return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload  = resolve;
        s.onerror = () => reject(new Error('Failed to load: ' + src));
        document.head.appendChild(s);
    });
}

function showFatalError(msg) {
    document.body.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:#020617;">
            <div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.35);border-radius:20px;padding:32px;max-width:420px;text-align:center;color:white;font-family:monospace;">
                <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
                <h2 style="font-size:18px;font-weight:900;color:#f87171;margin-bottom:12px;letter-spacing:.05em;">FIREBASE LOAD FAILED</h2>
                <p style="font-size:12px;color:#94a3b8;line-height:1.8;">${msg}</p>
                <p style="font-size:11px;color:#64748b;margin-top:16px;border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;">
                    Kiểm tra kết nối mạng và thử lại.<br>
                    Nếu dùng GitHub Pages, đảm bảo deploy đúng cách.
                </p>
                <button onclick="location.reload()" style="margin-top:20px;background:rgba(0,242,255,0.1);border:1px solid rgba(0,242,255,0.3);color:#00f2ff;padding:10px 24px;border-radius:100px;font-size:12px;font-weight:900;cursor:pointer;letter-spacing:.08em;">
                    THỬ LẠI
                </button>
            </div>
        </div>`;
}

// Load SEQUENTIALLY: database-compat requires app-compat to exist first
// Use jsDelivr — it reliably hosts all Firebase 9.x individual module files
loadScript('https://cdn.jsdelivr.net/npm/firebase@9.17.1/firebase-app-compat.min.js')
    .then(() => loadScript('https://cdn.jsdelivr.net/npm/firebase@9.17.1/firebase-database-compat.min.js'))
    .then(bootApp)
    .catch(err => showFatalError(err.message));

// ─────────────────────────────────────────────────────────────────
//  STEP 2: Everything inside bootApp() runs AFTER SDKs are loaded
// ─────────────────────────────────────────────────────────────────
function bootApp() {
    const firebaseConfig = {
        apiKey:            "AIzaSyAAU_3tGfOFXThNgeOfzzaZ1JJsIRXvm9I",
        authDomain:        "cccc-1e4fe.firebaseapp.com",
        databaseURL:       "https://cccc-1e4fe-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId:         "cccc-1e4fe",
        storageBucket:     "cccc-1e4fe.firebasestorage.app",
        messagingSenderId: "23606175445",
        appId:             "1:23606175445:web:9cb963552b352cf308e45c"
    };

    let dbRef;
    try {
        firebase.initializeApp(firebaseConfig);
        dbRef = firebase.database().ref('NEBULA_DATA_V5');
    } catch(e) {
        showFatalError(e.message); return;
    }

    // ── STATE ──────────────────────────────────────────────────
    const ADMIN     = { u: 'gbao', p: '031008' };
    let db          = { users: [], accounts: [] };
    let currentMode = '';
    let currentUser = null;

    // ── REALTIME SYNC ──────────────────────────────────────────
    dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        // Firebase stores arrays as objects {0:{}, 1:{}} — convert back to real arrays
        const toArr = v => v ? (Array.isArray(v) ? v : Object.values(v)) : [];
        db.users    = toArr(data && data.users);
        db.accounts = toArr(data && data.accounts);
        if (currentMode) renderUI();
    }, (err) => {
        showFatalError('Database error: ' + err.message +
            '<br><br>Vào Firebase Console → Realtime Database → Rules và set <b style="color:#fbbf24">.read / .write = true</b>');
    });

    function sync() {
        return dbRef.set({ users: db.users, accounts: db.accounts });
    }

    // ── AUTH ───────────────────────────────────────────────────
    window.login = function() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if (!u || !p) { showError('Vui lòng nhập đầy đủ thông tin'); return; }

        if (u === ADMIN.u && p === ADMIN.p) {
            currentMode = 'admin';
            showPage('admin-page');
            renderUI();
            return;
        }
        const user = db.users.find(x => x.u === u && x.p === p);
        if (user) {
            currentMode = 'user';
            currentUser = user;
            document.getElementById('user-name').innerText = u.toUpperCase();
            showPage('user-page');
            renderUI();
        } else {
            const e = document.getElementById('login-error');
            e.classList.remove('hidden');
            setTimeout(() => e.classList.add('hidden'), 3000);
        }
    };

    window.logout = function() {
        currentMode = ''; currentUser = null;
        showPage('login-page');
        document.getElementById('user').value = '';
        document.getElementById('pass').value = '';
    };

    // ── ACCOUNT OPERATIONS ─────────────────────────────────────
    window.postAcc = function() {
        const tk = document.getElementById('acc-tk').value.trim();
        const mk = document.getElementById('acc-mk').value.trim();
        const lv = document.getElementById('acc-lv').value.trim();
        if (!tk || !mk || !lv) { showToast('Điền đầy đủ thông tin!'); return; }
        db.accounts.push({ id: Date.now(), uploader: currentUser.u, tk, mk, lv: Number(lv) });
        sync().then(() => showToast('✓ Đăng acc thành công'));
        ['acc-tk','acc-mk','acc-lv'].forEach(id => document.getElementById(id).value = '');
    };

    window.adminPostAcc = function() {
        const tk = document.getElementById('ad-acc-tk').value.trim();
        const mk = document.getElementById('ad-acc-mk').value.trim();
        const lv = document.getElementById('ad-acc-lv').value.trim();
        if (!tk || !mk || !lv) { showToast('Điền đầy đủ thông tin!'); return; }
        db.accounts.push({ id: Date.now(), uploader: 'ADMIN', tk, mk, lv: Number(lv) });
        sync().then(() => showToast('✓ Up acc thành công'));
        ['ad-acc-tk','ad-acc-mk','ad-acc-lv'].forEach(id => document.getElementById(id).value = '');
    };

    window.deleteAcc = function(id) {
        db.accounts = db.accounts.filter(a => a.id !== id);
        sync().then(() => showToast('✕ Đã xoá acc'));
    };

    // ── USER MANAGEMENT ────────────────────────────────────────
    window.addUser = function() {
        const u = document.getElementById('new-u').value.trim();
        const p = document.getElementById('new-p').value.trim();
        if (!u || !p) { showToast('Nhập đủ tên và mật khẩu!'); return; }
        if (db.users.find(x => x.u === u)) { showToast('Tên user đã tồn tại!'); return; }
        db.users.push({ u, p, createdAt: Date.now() });
        sync().then(() => showToast('✓ Đã cấp tài khoản: ' + u));
        ['new-u','new-p'].forEach(id => document.getElementById(id).value = '');
    };

    window.deleteUser = function(u) {
        db.users = db.users.filter(x => x.u !== u);
        sync().then(() => showToast('✕ Đã xoá user: ' + u));
    };

    // ── RENDER ─────────────────────────────────────────────────
    function renderUI() {
        if (currentMode === 'admin') renderAdmin();
        if (currentMode === 'user')  renderUser();
    }

    function renderAdmin() {
        document.getElementById('admin-global-stats').innerHTML =
            statCard('fa-database',     db.accounts.length,                                   'Tổng Acc',   '#00f2ff') +
            statCard('fa-users',        db.users.length,                                      'Tổng User',  '#a855f7') +
            statCard('fa-crown',        db.accounts.filter(a=>a.lv>=100).length,              'LV 100+',    '#facc15') +
            statCard('fa-shield-halved',db.accounts.filter(a=>a.uploader==='ADMIN').length,   'Acc Root',   '#f97316');

        const search   = (document.getElementById('admin-search') ? document.getElementById('admin-search').value : '').toLowerCase();
        const filtered = db.accounts.filter(a =>
            !search || a.tk.toLowerCase().includes(search) || a.uploader.toLowerCase().includes(search)
        );
        document.getElementById('admin-list-accs').innerHTML =
            filtered.length === 0 ? emptyState('Không có acc nào') : filtered.slice().reverse().map(a => accCard(a, true)).join('');

        document.getElementById('admin-list-users').innerHTML =
            db.users.length === 0 ? emptyState('Chưa có user nào') : db.users.slice().reverse().map(userCard).join('');
    }

    function renderUser() {
        const myAccs = db.accounts.filter(a => a.uploader === currentUser.u);
        document.getElementById('user-global-stats').innerHTML =
            statCard('fa-database',       db.accounts.length,                    'Tổng Acc',    '#00f2ff') +
            statCard('fa-cloud-arrow-up', myAccs.length,                         'Acc của tôi', '#ff00e5') +
            statCard('fa-crown',          myAccs.filter(a=>a.lv>=100).length,    'LV 100+',     '#facc15');

        const countEl = document.getElementById('user-acc-count');
        countEl.innerText = myAccs.length > 0 ? myAccs.length + ' acc' : '';

        document.getElementById('user-list').innerHTML =
            myAccs.length === 0 ? emptyState('Bạn chưa đăng acc nào') : myAccs.slice().reverse().map(a => accCard(a, false)).join('');
    }

    // ── CARD TEMPLATES ─────────────────────────────────────────
    function statCard(icon, value, label, color) {
        return '<div class="stat-card rounded-2xl p-4 text-center flex-shrink-0" style="min-width:110px">' +
            '<i class="fa-solid ' + icon + ' text-lg mb-2" style="color:' + color + '"></i>' +
            '<div class="text-2xl font-black" style="color:' + color + '">' + value + '</div>' +
            '<div class="text-xs text-gray-500 font-bold uppercase mt-1" style="font-size:9px;letter-spacing:.1em">' + label + '</div>' +
            '</div>';
    }

    function accCard(a, isAdmin) {
        const canDelete = isAdmin || (currentUser && a.uploader === currentUser.u);
        const col = a.uploader === 'ADMIN' ? '#f97316' : '#a855f7';
        return '<div class="acc-card glass p-5 rounded-2xl" style="border-left:3px solid ' + col + '40">' +
            '<div class="flex justify-between items-start mb-3">' +
                '<div style="display:flex;align-items:center;gap:8px">' +
                    '<span class="lv-badge">LV ' + a.lv + '</span>' +
                    '<span style="font-size:9px;font-weight:700;color:' + col + '">@' + a.uploader + '</span>' +
                '</div>' +
                (canDelete ? '<button onclick="deleteAcc(' + a.id + ')" class="btn-delete" style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px"><i class="fa-solid fa-trash"></i></button>' : '') +
            '</div>' +
            '<div>' +
                '<div class="flex justify-between items-center" style="margin-bottom:8px">' +
                    '<div><p style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px">Tài khoản</p>' +
                    '<p style="font-size:14px;font-weight:700;font-family:monospace">' + a.tk + '</p></div>' +
                    '<button onclick="copyText(\'' + escHtml(a.tk) + '\')" style="color:#64748b;padding:0 8px"><i class="fa-solid fa-copy"></i></button>' +
                '</div>' +
                '<div style="height:1px;background:rgba(255,255,255,0.04);margin-bottom:8px"></div>' +
                '<div class="flex justify-between items-center">' +
                    '<div><p style="font-size:9px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px">Mật khẩu</p>' +
                    '<p style="font-size:14px;font-weight:700;font-family:monospace">' + a.mk + '</p></div>' +
                    '<button onclick="copyText(\'' + escHtml(a.mk) + '\')" style="color:#64748b;padding:0 8px"><i class="fa-solid fa-copy"></i></button>' +
                '</div>' +
            '</div>' +
            '</div>';
    }

    function userCard(u) {
        const n = db.accounts.filter(a => a.uploader === u.u).length;
        return '<div class="user-pill p-4 rounded-2xl flex justify-between items-center">' +
            '<div style="display:flex;align-items:center;gap:12px">' +
                '<div style="width:36px;height:36px;border-radius:10px;background:rgba(250,204,21,0.1);border:1px solid rgba(250,204,21,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#facc15">' +
                    u.u[0].toUpperCase() +
                '</div>' +
                '<div><p style="font-weight:700;font-size:14px">' + u.u + '</p>' +
                '<p style="font-size:9px;color:#64748b">' + n + ' acc · pass: ' + u.p + '</p></div>' +
            '</div>' +
            '<button onclick="deleteUser(\'' + escHtml(u.u) + '\')" class="btn-delete" style="width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px"><i class="fa-solid fa-user-xmark"></i></button>' +
            '</div>';
    }

    function emptyState(msg) {
        return '<div style="text-align:center;padding:64px 0;color:#475569">' +
            '<i class="fa-solid fa-inbox" style="font-size:40px;margin-bottom:16px;display:block;opacity:.3"></i>' +
            '<p style="font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">' + msg + '</p>' +
            '</div>';
    }

    // ── TABS ───────────────────────────────────────────────────
    window.switchAdminTab = function(tab) {
        const isAcc = tab === 'acc';
        document.getElementById('admin-tab-acc').classList.toggle('hidden', !isAcc);
        document.getElementById('admin-tab-user').classList.toggle('hidden', isAcc);
        document.getElementById('tab-acc-btn').classList.toggle('tab-active', isAcc);
        document.getElementById('tab-user-btn').classList.toggle('tab-active', !isAcc);
    };

    // ── UTILS ──────────────────────────────────────────────────
    function showPage(pageId) {
        ['login-page','admin-page','user-page'].forEach(id => {
            document.getElementById(id).classList.toggle('hidden', id !== pageId);
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2200);
    }

    function showError(msg) {
        const e = document.getElementById('login-error');
        e.innerText = '✕ ' + msg;
        e.classList.remove('hidden');
        setTimeout(() => e.classList.add('hidden'), 3000);
    }

    window.copyText = function(text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => showToast('✓ Đã copy!'));
        } else {
            const ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('✓ Đã copy!');
        }
    };

    function escHtml(str) {
        return String(str).replace(/'/g, "\\'").replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── KEYBOARD SUPPORT ───────────────────────────────────────
    document.getElementById('pass').addEventListener('keydown', e => {
        if (e.key === 'Enter') window.login();
    });
    document.getElementById('user').addEventListener('keydown', e => {
        if (e.key === 'Enter') window.login();
    });

} // end bootApp()
</script>
