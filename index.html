<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Game Supreme Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-blue { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); transition: 0.3s; }
        .hidden { display: none; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        input:focus { outline: none; border-color: #3b82f6; background: rgba(15, 23, 42, 0.9) !important; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="text-slate-100 min-h-screen">

    <!-- LOGIN PAGE -->
    <div id="login-page" class="flex items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm glass p-8 rounded-[3rem] shadow-2xl border-t-blue-500/30 border-t-2 text-center">
            <i class="fa-solid fa-bolt-lightning text-5xl text-blue-500 mb-6 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i>
            <h1 class="text-3xl font-black tracking-tighter uppercase mb-8">Game<span class="text-blue-500">Hub</span></h1>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Username" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700">
                <button onclick="login()" class="w-full btn-blue py-4 rounded-2xl font-black text-lg shadow-blue-900/40 shadow-xl active:scale-95">ĐĂNG NHẬP</button>
            </div>
        </div>
    </div>

    <!-- ADMIN PAGE -->
    <div id="admin-page" class="hidden safe-top p-4">
        <div class="max-w-4xl mx-auto">
            <header class="flex justify-between items-center py-6 px-4">
                <h2 class="text-2xl font-black italic text-blue-500">ADMIN <span class="text-white font-sans uppercase" id="ad-name-display">GBAO</span></h2>
                <div class="flex gap-2">
                    <button onclick="openSettings()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-slate-400"><i class="fa-solid fa-gear"></i></button>
                    <button onclick="logout()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-red-400"><i class="fa-solid fa-power-off"></i></button>
                </div>
            </header>

            <div class="flex border-b border-slate-800 mb-6 font-bold text-xs tracking-widest">
                <button id="tab-acc-btn" onclick="switchAdminTab('acc')" class="flex-1 py-4 tab-active uppercase">Kho Tài Khoản</button>
                <button id="tab-user-btn" onclick="switchAdminTab('user')" class="flex-1 py-4 uppercase">Thành Viên</button>
            </div>

            <!-- TAB ACC -->
            <div id="admin-tab-acc">
                <div class="glass p-6 rounded-3xl mb-6 shadow-xl border-l-4 border-l-blue-500">
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input type="text" id="ad-acc-tk" placeholder="TK Game" class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-sm">
                        <input type="text" id="ad-acc-mk" placeholder="MK Game" class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-sm">
                    </div>
                    <div class="flex gap-3">
                        <input type="number" id="ad-acc-lv" placeholder="Level" class="flex-1 bg-slate-950 p-3 rounded-xl border border-slate-800 text-sm">
                        <button onclick="adminPostAcc()" class="btn-blue px-8 rounded-xl font-black text-xs uppercase">Up Acc</button>
                    </div>
                </div>
                <input type="text" id="admin-search" oninput="renderAdminAccs()" placeholder="Tìm kiếm tài khoản..." class="w-full p-4 mb-6 rounded-2xl glass border-none text-sm">
                <div id="admin-list-accs" class="space-y-4 pb-24"></div>
            </div>

            <!-- TAB USER -->
            <div id="admin-tab-user" class="hidden">
                <div class="glass p-6 rounded-3xl mb-6 border-l-4 border-l-yellow-600">
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <input type="text" id="new-u" placeholder="Tên User mới" class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-sm">
                        <input type="text" id="new-p" placeholder="Mật khẩu" class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-sm">
                        <button onclick="addUser()" class="btn-blue p-3 rounded-xl font-bold text-xs uppercase">Cấp Nick</button>
                    </div>
                </div>
                <div id="admin-list-users" class="space-y-3 pb-24"></div>
            </div>
        </div>
    </div>

    <!-- USER PAGE -->
    <div id="user-page" class="hidden safe-top p-4">
        <div class="max-w-2xl mx-auto">
            <header class="flex justify-between items-center py-6 px-4">
                <h2 class="text-2xl font-black uppercase">Hi, <span id="user-name" class="text-blue-500"></span></h2>
                <div class="flex gap-2">
                    <button onclick="openSettings()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-slate-400"><i class="fa-solid fa-user-gear"></i></button>
                    <button onclick="logout()" class="text-slate-500 text-xs font-bold uppercase underline">Thoát</button>
                </div>
            </header>

            <div class="glass p-6 rounded-[2.5rem] mb-10 shadow-2xl border-t-2 border-t-blue-500">
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="acc-tk" placeholder="TK Game" class="bg-slate-950 p-4 rounded-2xl border border-slate-800 text-sm">
                        <input type="text" id="acc-mk" placeholder="MK Game" class="bg-slate-950 p-4 rounded-2xl border border-slate-800 text-sm">
                    </div>
                    <input type="number" id="acc-lv" placeholder="Level tài khoản" class="w-full bg-slate-950 p-4 rounded-2xl border border-slate-800 text-sm">
                    <button onclick="postAcc()" class="w-full btn-blue py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition">UP DỮ LIỆU</button>
                </div>
            </div>
            <div id="user-list" class="space-y-3 pb-20"></div>
        </div>
    </div>

    <!-- SETTINGS MODAL (ĐỔI MK) -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center bg-black/80 backdrop-blur-sm">
        <div class="w-full max-w-md glass rounded-t-[3rem] p-8 modal-up shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
            <div class="w-12 h-1 bg-slate-700 mx-auto rounded-full mb-8"></div>
            <h3 class="text-xl font-black mb-6 flex items-center gap-3">
                <i class="fa-solid fa-key text-blue-500"></i> ĐỔI MẬT KHẨU
            </h3>
            <div class="space-y-4">
                <input type="password" id="old-p" placeholder="Mật khẩu hiện tại" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 text-sm">
                <input type="password" id="new-p-change" placeholder="Mật khẩu mới" class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 text-sm">
                <div class="flex gap-3 mt-4">
                    <button onclick="closeSettings()" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 glass">HỦY</button>
                    <button onclick="confirmChangePass()" class="flex-1 py-4 btn-blue rounded-2xl font-black">LƯU THAY ĐỔI</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('game_final_db')) || { 
            admin: { u: 'gbao', p: '031008' },
            users: [], 
            accounts: [] 
        };
        let currentMode = ''; // 'admin' or 'user'
        let currentUser = null;

        const saveDB = () => localStorage.setItem('game_final_db', JSON.stringify(db));

        function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            
            if (u === db.admin.u && p === db.admin.p) {
                currentMode = 'admin';
                showPage('admin-page');
                switchAdminTab('acc');
            } else {
                const user = db.users.find(x => x.u === u && x.p === p);
                if (user) {
                    currentMode = 'user';
                    currentUser = user;
                    document.getElementById('user-name').innerText = u;
                    showPage('user-page');
                    renderUserAccs();
                } else alert('Sai tài khoản hoặc mật khẩu!');
            }
        }

        // --- PASSWORD FUNCTIONS ---
        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

        function confirmChangePass() {
            const oldP = document.getElementById('old-p').value;
            const newP = document.getElementById('new-p-change').value;
            if(!newP) return alert('Nhập mật khẩu mới!');

            if(currentMode === 'admin') {
                if(oldP !== db.admin.p) return alert('Sai mật khẩu cũ!');
                db.admin.p = newP;
                alert('Đã đổi mật khẩu Admin thành công!');
            } else {
                if(oldP !== currentUser.p) return alert('Sai mật khẩu cũ!');
                const idx = db.users.findIndex(x => x.u === currentUser.u);
                db.users[idx].p = newP;
                currentUser.p = newP;
                alert('Đã đổi mật khẩu thành công!');
            }
            saveDB();
            closeSettings();
            document.getElementById('old-p').value = '';
            document.getElementById('new-p-change').value = '';
        }

        // --- ADMIN FUNCTIONS ---
        function switchAdminTab(type) {
            document.getElementById('admin-tab-acc').classList.toggle('hidden', type !== 'acc');
            document.getElementById('admin-tab-user').classList.toggle('hidden', type !== 'user');
            document.getElementById('tab-acc-btn').classList.toggle('tab-active', type === 'acc');
            document.getElementById('tab-user-btn').classList.toggle('tab-active', type === 'user');
            type === 'acc' ? renderAdminAccs() : renderAdminUsers();
        }

        function addUser() {
            const u = document.getElementById('new-u').value.trim();
            const p = document.getElementById('new-p').value.trim();
            if (!u || !p) return;
            if (db.users.find(x => x.u === u)) return alert('Tên này đã tồn tại!');
            db.users.push({ u, p });
            saveDB(); renderAdminUsers();
            document.getElementById('new-u').value = ''; document.getElementById('new-p').value = '';
        }

        function deleteUser(uName) {
            if(confirm(`Xóa User [${uName}]?`)) {
                db.users = db.users.filter(x => x.u !== uName);
                db.accounts = db.accounts.filter(x => x.uploader !== uName);
                saveDB(); renderAdminUsers();
            }
        }

        function adminPostAcc() {
            const tk = document.getElementById('ad-acc-tk').value.trim();
            const mk = document.getElementById('ad-acc-mk').value.trim();
            const lv = document.getElementById('ad-acc-lv').value.trim();
            if (!tk || !mk || !lv) return;
            db.accounts.push({ id: Date.now(), uploader: 'ADMIN', tk, mk, lv });
            saveDB(); renderAdminAccs();
            document.querySelectorAll('#admin-tab-acc input').forEach(i => i.value = '');
        }

        function renderAdminAccs() {
            const search = document.getElementById('admin-search').value.toLowerCase();
            const container = document.getElementById('admin-list-accs');
            const filtered = db.accounts.filter(a => a.tk.toLowerCase().includes(search) || a.uploader.toLowerCase().includes(search));
            container.innerHTML = filtered.map(acc => `
                <div class="glass p-5 rounded-3xl flex justify-between items-center border-l-4 border-blue-500 shadow-xl">
                    <div class="flex-1">
                        <div class="text-[9px] font-black uppercase mb-1 ${acc.uploader === 'ADMIN' ? 'text-yellow-500' : 'text-slate-500'}">Up: ${acc.uploader}</div>
                        <div class="font-bold text-slate-100 flex items-center gap-2">${acc.tk} <i onclick="copyText('${acc.tk}')" class="fa-solid fa-copy text-slate-600 text-[10px]"></i></div>
                        <div class="text-xs text-slate-500 font-mono italic flex items-center gap-2">MK: ${acc.mk} <i onclick="copyText('${acc.mk}')" class="fa-solid fa-copy text-[10px]"></i></div>
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-black text-blue-400 mb-2">LV.${acc.lv}</div>
                        <button onclick="deleteAcc(${acc.id})" class="text-red-500/30 hover:text-red-500 transition"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function deleteAcc(id) { if(confirm('Xóa acc?')) { db.accounts = db.accounts.filter(a => a.id !== id); saveDB(); renderAdminAccs(); } }

        function renderAdminUsers() {
            const container = document.getElementById('admin-list-users');
            container.innerHTML = db.users.map(user => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border border-slate-800">
                    <div>
                        <div class="font-bold text-slate-200 uppercase text-sm">${user.u}</div>
                        <div class="text-[10px] text-slate-500 font-mono">P: ${user.p}</div>
                    </div>
                    <button onclick="deleteUser('${user.u}')" class="bg-red-500/10 text-red-400 p-2 px-3 rounded-xl text-[10px] font-bold">XÓA</button>
                </div>
            `).reverse().join('');
        }

        // --- USER FUNCTIONS ---
        function postAcc() {
            const tk = document.getElementById('acc-tk').value.trim();
            const mk = document.getElementById('acc-mk').value.trim();
            const lv = document.getElementById('acc-lv').value.trim();
            if (!tk || !mk || !lv) return alert('Nhập đủ thông tin!');
            db.accounts.push({ id: Date.now(), uploader: currentUser.u, tk, mk, lv });
            saveDB(); renderUserAccs();
            alert('Đã up!');
            document.querySelectorAll('#user-page input').forEach(i => i.value = '');
        }

        function renderUserAccs() {
            const container = document.getElementById('user-list');
            const myAccs = db.accounts.filter(a => a.uploader === currentUser.u);
            container.innerHTML = myAccs.map(acc => `
                <div class="glass p-5 rounded-3xl flex justify-between items-center border-l-2 border-slate-700 shadow-md">
                    <div><div class="font-bold text-blue-400 text-base">${acc.tk}</div><div class="text-xs text-slate-500 font-mono">Pass: ${acc.mk}</div></div>
                    <div class="text-xl font-black text-white">LV.${acc.lv}</div>
                </div>
            `).reverse().join('');
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            const notice = document.createElement('div');
            notice.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-full text-[10px] font-bold z-[100]';
            notice.innerText = 'COPIED';
            document.body.appendChild(notice);
            setTimeout(() => notice.remove(), 800);
        }

        function showPage(id) {
            ['login-page', 'admin-page', 'user-page'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
