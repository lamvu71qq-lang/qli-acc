<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Game Manager Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-blue { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
        .hidden { display: none; }
        input { transition: 0.2s; }
        input:focus { border-color: #3b82f6; background: rgba(15, 23, 42, 0.8); }
        .safe-top { padding-top: env(safe-area-inset-top); }
        ::-webkit-scrollbar { width: 0px; } /* Ẩn cuộn cho đẹp */
    </style>
</head>
<body class="text-slate-100 min-h-screen">

    <!-- LOGIN -->
    <div id="login-page" class="flex items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm glass p-8 rounded-[2.5rem] shadow-2xl border-t-blue-500/30 border-t-2">
            <div class="text-center mb-10">
                <i class="fa-solid fa-bolt-lightning text-5xl text-blue-500 mb-4"></i>
                <h1 class="text-3xl font-black tracking-tighter uppercase">Game<span class="text-blue-500">Vault</span></h1>
                <p class="text-slate-400 text-xs mt-2 font-bold tracking-widest uppercase">Manager System</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Tài khoản hệ thống" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white">
                <input type="password" id="pass" placeholder="Mật khẩu" class="w-full p-4 rounded-2xl bg-slate-900/50 border border-slate-700 text-white">
                <button onclick="login()" class="w-full btn-blue py-4 rounded-2xl font-black text-lg shadow-lg active:scale-95 transition">VÀO APP</button>
            </div>
        </div>
    </div>

    <!-- ADMIN PAGE -->
    <div id="admin-page" class="hidden safe-top p-4">
        <div class="max-w-4xl mx-auto">
            <header class="flex justify-between items-center py-6 px-4">
                <h2 class="text-2xl font-black italic text-blue-500">ADMIN <span class="text-white">GBAO</span></h2>
                <button onclick="logout()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-red-400"><i class="fa-solid fa-power-off"></i></button>
            </header>

            <!-- TẠO USER -->
            <div class="glass p-6 rounded-3xl mb-6 shadow-xl border-l-4 border-l-blue-500">
                <h3 class="font-bold text-xs uppercase text-slate-400 mb-4 tracking-widest">Cấp quyền User mới</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <input type="text" id="new-u" placeholder="Tên User" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 text-sm">
                    <input type="text" id="new-p" placeholder="Mật khẩu" class="bg-slate-900/50 p-3 rounded-xl border border-slate-700 text-sm">
                    <button onclick="addUser()" class="btn-blue p-3 rounded-xl font-bold text-sm">TẠO NGAY</button>
                </div>
            </div>

            <!-- LỌC VÀ TÌM KIẾM -->
            <div class="mb-6 px-2">
                <div class="relative">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-500"></i>
                    <input type="text" id="admin-search" oninput="renderAdmin()" placeholder="Tìm theo tên acc hoặc người up..." class="w-full pl-12 pr-4 py-4 rounded-2xl glass border-none focus:ring-2 focus:ring-blue-500 shadow-lg text-sm">
                </div>
            </div>

            <h3 class="font-bold text-xs text-slate-500 uppercase px-4 mb-4 tracking-tighter italic">Cơ sở dữ liệu toàn bộ:</h3>
            <div id="admin-list" class="space-y-4 pb-20 text-sm"></div>
        </div>
    </div>

    <!-- USER PAGE -->
    <div id="user-page" class="hidden safe-top p-4">
        <div class="max-w-2xl mx-auto">
            <header class="flex justify-between items-center py-6 px-4">
                <h2 class="text-2xl font-black uppercase tracking-tight">User: <span id="user-name" class="text-blue-500"></span></h2>
                <button onclick="logout()" class="text-slate-500 text-sm">Rời khỏi</button>
            </header>

            <div class="glass p-6 rounded-[2rem] mb-10 border-t-2 border-t-blue-500 shadow-2xl">
                <h3 class="font-bold text-center mb-6 text-sm tracking-widest text-blue-400">UP TÀI KHOẢN MỚI</h3>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="acc-tk" placeholder="TK Game" class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-sm">
                        <input type="text" id="acc-mk" placeholder="MK Game" class="bg-slate-900 p-4 rounded-2xl border border-slate-800 text-sm">
                    </div>
                    <input type="number" id="acc-lv" placeholder="Level tài khoản" class="w-full bg-slate-900 p-4 rounded-2xl border border-slate-800 text-sm">
                    <button onclick="postAcc()" class="w-full btn-blue py-4 rounded-2xl font-black text-lg shadow-blue-900/20 shadow-xl">GỬI DỮ LIỆU</button>
                </div>
            </div>

            <h3 class="font-bold text-xs text-slate-500 uppercase px-4 mb-4">Kho acc của riêng bạn:</h3>
            <div id="user-list" class="space-y-3 pb-20"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('game_ultra_db')) || { users: [], accounts: [] };
        let currentUser = null;

        const saveDB = () => localStorage.setItem('game_ultra_db', JSON.stringify(db));

        function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if (u === 'gbao' && p === '031008') { showPage('admin-page'); renderAdmin(); }
            else {
                const user = db.users.find(x => x.u === u && x.p === p);
                if (user) { currentUser = u; document.getElementById('user-name').innerText = u; showPage('user-page'); renderUser(); }
                else alert('Sai tài khoản!');
            }
        }

        function addUser() {
            const u = document.getElementById('new-u').value.trim();
            const p = document.getElementById('new-p').value.trim();
            if (!u || !p) return;
            db.users.push({ u, p }); saveDB();
            alert('Đã tạo user ' + u);
            document.getElementById('new-u').value = ''; document.getElementById('new-p').value = '';
        }

        function postAcc() {
            const tk = document.getElementById('acc-tk').value.trim();
            const mk = document.getElementById('acc-mk').value.trim();
            const lv = document.getElementById('acc-lv').value.trim();
            if (!tk || !mk || !lv) return alert('Nhập đủ thông tin!');
            db.accounts.push({ id: Date.now(), uploader: currentUser, tk, mk, lv });
            saveDB(); renderUser();
            alert('Đã up xong!');
            document.querySelectorAll('#user-page input').forEach(i => i.value = '');
        }

        // COPY FUNCTION
        function copyText(text) {
            navigator.clipboard.writeText(text);
            alert('Đã copy: ' + text);
        }

        // ADMIN DELETE ACC
        function deleteAcc(id) {
            if(confirm('Xóa acc này khỏi hệ thống?')) {
                db.accounts = db.accounts.filter(a => a.id !== id);
                saveDB(); renderAdmin();
            }
        }

        function renderAdmin() {
            const search = document.getElementById('admin-search').value.toLowerCase();
            const container = document.getElementById('admin-list');
            const filtered = db.accounts.filter(a => a.tk.toLowerCase().includes(search) || a.uploader.toLowerCase().includes(search));
            
            container.innerHTML = filtered.map(acc => `
                <div class="glass p-5 rounded-3xl flex justify-between items-center border-l-4 border-l-blue-500 shadow-md">
                    <div class="flex-1">
                        <div class="text-[10px] text-blue-500 font-black uppercase mb-1">Up bởi: ${acc.uploader}</div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-white text-base">${acc.tk}</span>
                            <button onclick="copyText('${acc.tk}')" class="text-slate-500 hover:text-white"><i class="fa-solid fa-copy text-xs"></i></button>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-slate-400 font-mono italic">MK: ${acc.mk}</span>
                            <button onclick="copyText('${acc.mk}')" class="text-slate-500 hover:text-white"><i class="fa-solid fa-copy text-[10px]"></i></button>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div class="text-xl font-black text-blue-400">LV.${acc.lv}</div>
                        <button onclick="deleteAcc(${acc.id})" class="text-red-500/50 hover:text-red-500 text-xs px-2 py-1 glass rounded-lg border-none"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function renderUser() {
            const container = document.getElementById('user-list');
            const myAccs = db.accounts.filter(a => a.uploader === currentUser);
            container.innerHTML = myAccs.map(acc => `
                <div class="glass p-5 rounded-2xl flex justify-between items-center border-l-2 border-l-slate-700">
                    <div>
                        <div class="font-bold text-blue-400">${acc.tk}</div>
                        <div class="text-xs text-slate-500 font-mono">Pass: ${acc.mk}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-lg font-black text-white">LV.${acc.lv}</div>
                    </div>
                </div>
            `).reverse().join('');
        }

        function showPage(id) {
            ['login-page', 'admin-page', 'user-page'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
