<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ACC MANAGER</title>
<style>
body{
    font-family:Arial;
    background:#111;
    color:white;
    padding:20px;
}
input,textarea,button{
    padding:8px;
    margin:5px;
}
.card{
    border:1px solid #444;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}
.used{
    border-color:red;
}
.unused{
    border-color:lime;
}
</style>
</head>
<body>
<h1>ACC MANAGER</h1>
<h3>Tổng ACC: <span id="total">0</span></h3>
<hr>
<h2>Thêm ACC</h2>

Thêm

<hr>
<h2>Import Hàng Loạt</h2>
<textarea id="bulkUsers"
rows="8"
cols="40"
placeholder="Mỗi dòng 1 acc"></textarea>
<br>

Import

<hr>
<div id="list"></div>
<script>
let accounts =
JSON.parse(localStorage.getItem("accounts") || "[]");
function save(){
    localStorage.setItem(
        "accounts",
        JSON.stringify(accounts)
    );
}
function render(){
    let html = "";
    accounts.forEach((acc,index)=>{
        html += `
        <div class="card ${acc.used?'used':'unused'}">
        <b>${acc.username}</b><br>
        Password:
        ${acc.password}<br>
        Note:
        ${acc.note || '-'}<br>
        Status:
        ${acc.used ? 'ĐÃ DÙNG' : 'CHƯA DÙNG'}
        <br><br>
        <button onclick="toggleUsed(${index})">
        Đổi trạng thái
        </button>
        <button onclick="deleteAcc(${index})">
        Xóa
        </button>
        </div>
        `;
    });
    document.getElementById("list").innerHTML = html;
    document.getElementById("total").innerText =
    accounts.length;
}
function addAcc(){
    const username =
    document.getElementById("user").value;
    const password =
    document.getElementById("pass").value;
    const note =
    document.getElementById("note").value;
    if(!username || !password){
        alert("Thiếu thông tin");
        return;
    }
    accounts.push({
        username,
        password,
        note,
        used:false
    });
    save();
    render();
}
function bulkAdd(){
    const pass =
    document.getElementById("bulkPass").value;
    const users =
    document.getElementById("bulkUsers")
    .value
    .split("\n")
    .filter(x=>x.trim());
    users.forEach(u=>{
        accounts.push({
            username:u.trim(),
            password:pass,
            note:"",
            used:false
        });
    });
    save();
    render();
}
function toggleUsed(i){
    accounts[i].used =
    !accounts[i].used;
    save();
    render();
}
function deleteAcc(i){
    if(confirm("Xóa ACC?")){
        accounts.splice(i,1);
        save();
        render();
    }
}
render();
</script>
</body>
</html>
