<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nebula Vault v5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
<style>
    :root{--neon-blue:#00f2ff;--neon-pink:#ff00e5;--neon-yellow:#facc15;--neon-green:#00ff88}
    *{box-sizing:border-box}
    body{background:radial-gradient(ellipse at top right,#1e1b4b 0%,#0a0a1a 60%,#020617 100%);font-family:'Segoe UI',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;min-height:100vh;color:white;overflow-x:hidden}
    .glass{background:rgba(255,255,255,0.04);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 40px rgba(0,0,0,0.6)}
    .glass-strong{background:rgba(255,255,255,0.07);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,0.12);box-shadow:0 20px 60px rgba(0,0,0,0.8)}
    .btn-rainbow{background:linear-gradient(135deg,#ff00e5,#9d00ff,#00f2ff,#00ff88);background-size:300% 300%;animation:gradientMove 4s ease infinite;font-weight:900;transition:transform 0.1s;box-shadow:0 4px 24px rgba(0,242,255,0.25)}
    .btn-rainbow:active{transform:scale(0.97)}
    @keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .hidden{display:none!important}
    .tab-active{border-bottom:3px solid var(--neon-blue);color:var(--neon-blue);background:linear-gradient(to bottom,transparent,rgba(0,242,255,0.12))}
    input,textarea{background:rgba(0,0,0,0.5)!important;border:1px solid rgba(255,255,255,0.1)!important;color:white!important;outline:none!important}
    textarea{resize:vertical;font-family:'Courier New',monospace;font-size:12px;line-height:1.6}
    textarea::placeholder,input::placeholder{color:rgba(255,255,255,0.3)!important}
    .stat-card{background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(147,51,234,0.08));border:1px solid rgba(255,255,255,0.06);flex-shrink:0}
    .animate-fade{animation:fadeUp 0.35s ease forwards}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(0,242,255,0.15);border:1px solid rgba(0,242,255,0.4);color:#00f2ff;padding:12px 24px;border-radius:100px;font-size:13px;font-weight:700;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);z-index:9999}
    .toast.show{transform:translateX(-50%) translateY(0)}
    .lv-badge{background:linear-gradient(135deg,#facc15,#f97316);color:#1a0a00;font-weight:900;font-size:10px;padding:2px 8px;border-radius:100px}
    .btn-delete{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#f87171}
    .btn-edit{background:rgba(0,242,255,0.1);border:1px solid rgba(0,242,255,0.3);color:#00f2ff}
    .mode-toggle{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);border-radius:14px;display:flex;padding:4px;gap:4px}
    .mode-btn{flex:1;padding:8px;border-radius:10px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.06em;transition:all 0.2s;color:rgba(255,255,255,0.4)}
    .mode-btn.active{background:rgba(0,242,255,0.15);color:#00f2ff;border:1px solid rgba(0,242,255,0.3)}
    .bulk-ok{background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,0.15);display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;font-size:11px}
    .bulk-err{background:rgba(239,68,68,0.07);border:1px solid rgba(239,68,68,0.15);color:#f87171;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;font-size:11px}
    .user-acc-bar{height:4px;border-radius:100px;background:linear-gradient(90deg,#00f2ff,#a855f7);transition:width 0.6s ease}
    .acc-mini-tag{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.07);padding:3px 8px;border-radius:8px;font-size:10px;font-family:'Courier New',monospace}
    /* STATUS */
    .s-chua{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
    .s-dang{background:rgba(250,204,21,0.12);border:1px solid rgba(250,204,21,0.3);color:#fde68a}
    .s-xong{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.25);color:#86efac}
    .dot-chua{width:7px;height:7px;border-radius:50%;background:#ef4444;display:inline-block;animation:pr 1.5s infinite}
    .dot-dang{width:7px;height:7px;border-radius:50%;background:#facc15;display:inline-block;animation:py 1.5s infinite}
    .dot-xong{width:7px;height:7px;border-radius:50%;background:#00ff88;display:inline-block}
    @keyframes pr{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.5)}50%{box-shadow:0 0 0 5px rgba(239,68,68,0)}}
    @keyframes py{0%,100%{box-shadow:0 0 0 0 rgba(250,204,21,0.5)}50%{box-shadow:0 0 0 5px rgba(250,204,21,0)}}
    /* BEE */
    .bee-panel{background:linear-gradient(135deg,rgba(250,204,21,0.06),rgba(249,115,22,0.04));border:1px solid rgba(250,204,21,0.2);border-radius:24px;overflow:hidden;position:relative}
    .bee-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#facc15,#f97316,transparent)}
    .bee-avatar{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,#facc15,#f97316);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;box-shadow:0 4px 20px rgba(250,204,21,0.35)}
    .bee-bubble{background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:12px 14px;font-size:12px;line-height:1.75;color:#e2e8f0}
    .bee-typing span{display:inline-block;width:6px;height:6px;border-radius:50%;background:#facc15;animation:blink 1.2s infinite;margin-right:3px}
    .bee-typing span:nth-child(2){animation-delay:0.2s}
    .bee-typing span:nth-child(3){animation-delay:0.4s}
    @keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
    .bee-urgent-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:11px}
    .bee-tip-box{background:rgba(0,242,255,0.06);border:1px solid rgba(0,242,255,0.15);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:11px}
    /* PRIORITY CARD */
    .card-urgent{box-shadow:0 0 0 1.5px rgba(239,68,68,0.5),0 6px 24px rgba(239,68,68,0.15)!important}
    .priority-ribbon{position:absolute;top:-10px;left:10px;background:linear-gradient(135deg,#ef4444,#dc2626);color:white;font-size:9px;font-weight:900;padding:3px 12px;border-radius:100px;letter-spacing:0.08em;z-index:5}
    .acc-wrap{position:relative;padding-top:6px}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="login-page" class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-sm glass-strong p-10 rounded-[3rem] text-center">
        <h1 class="text-5xl font-black italic mb-2 tracking-tighter">NEBULA<span class="text-cyan-400">V5</span></h1>
        <p class="text-[9px] text-slate-500 tracking-[0.35em] mb-10 uppercase">Cloud Database System</p>
        <div class="space-y-3">
            <input type="text" id="user" placeholder="Username" class="w-full p-4 rounded-2xl text-sm">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl text-sm">
            <button onclick="login()" class="w-full btn-rainbow py-4 rounded-2xl text-base mt-2 uppercase">VÀO HỆ THỐNG</button>
        </div>
        <p id="login-error" class="hidden mt-4 text-xs text-red-400 font-bold">✕ Sai thông tin đăng nhập</p>
    </div>
</div>

<!-- ADMIN -->
<div id="admin-page" class="hidden p-4 pt-10 pb-20">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-8 px-2">
            <h2 class="text-2xl font-black italic">MASTER <span class="text-cyan-400">ADMIN</span></h2>
            <button onclick="logout()" class="w-11 h-11 glass rounded-xl text-red-400"><i class="fa-solid fa-power-off"></i></button>
        </header>
        <div id="admin-global-stats" class="flex gap-3 overflow-x-auto pb-3 mb-8"></div>
        <div class="flex gap-1 mb-8 p-1 glass rounded-2xl text-[10px] font-black uppercase">
            <button id="tab-acc-btn" onclick="switchAdminTab('acc')" class="flex-1 py-3.5 rounded-xl tab-active">Tất cả Acc</button>
            <button id="tab-user-btn" onclick="switchAdminTab('user')" class="flex-1 py-3.5 rounded-xl">Quản lý User</button>
        </div>
        <div id="admin-tab-acc" class="animate-fade">
            <div class="glass p-6 rounded-[2rem] mb-6">
                <div class="mode-toggle mb-4">
                    <button class="mode-btn active" id="admin-mode-single-btn" onclick="switchAdminMode('single')"><i class="fa-solid fa-pen mr-1"></i>Đơn lẻ</button>
                    <button class="mode-btn" id="admin-mode-bulk-btn" onclick="switchAdminMode('bulk')"><i class="fa-solid fa-layer-group mr-1"></i>Hàng loạt</button>
                </div>
                <div id="admin-single-mode" class="space-y-3">
                    <input type="text" id="ad-acc-tk" placeholder="Tài khoản game" class="w-full p-3.5 rounded-xl text-sm">
                    <input type="text" id="ad-acc-mk" placeholder="Mật khẩu game" class="w-full p-3.5 rounded-xl text-sm">
                    <input type="number" id="ad-acc-lv" placeholder="Level" class="w-full p-3.5 rounded-xl text-sm">
                    <button onclick="adminPostAcc()" class="w-full btn-rainbow py-3.5 rounded-xl text-sm uppercase">Up Acc Root</button>
                </div>
                <div id="admin-bulk-mode" class="hidden space-y-3">
                    <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-circle-info text-cyan-400 text-xs"></i><span class="text-[10px] text-slate-400">Mỗi dòng: <code class="text-cyan-300">tài_khoản|mật_khẩu|level</code></span></div>
                    <textarea id="admin-bulk-input" rows="7" placeholder="player001|pass123|80&#10;player002|abc456|75" class="w-full p-3.5 rounded-xl" oninput="previewBulk('admin')"></textarea>
                    <div id="admin-bulk-preview" class="space-y-1 max-h-40 overflow-y-auto"></div>
                    <button onclick="adminBulkPost()" class="w-full btn-rainbow py-3.5 rounded-xl text-sm uppercase"><i class="fa-solid fa-rocket mr-2"></i>Up Tất Cả</button>
                </div>
            </div>
            <div id="admin-list-accs" class="space-y-3"></div>
        </div>
        <div id="admin-tab-user" class="hidden animate-fade">
            <div class="glass p-6 rounded-[2rem] mb-6 space-y-3">
                <input type="text" id="new-u" placeholder="Tên User" class="w-full p-3.5 rounded-xl text-sm">
                <input type="text" id="new-p" placeholder="Mật khẩu" class="w-full p-3.5 rounded-xl text-sm">
                <button onclick="addUser()" class="w-full btn-rainbow py-3.5 rounded-xl text-sm uppercase">Cấp Tài Khoản</button>
            </div>
            <div id="admin-list-users" class="space-y-3"></div>
        </div>
    </div>
</div>

<!-- USER -->
<div id="user-page" class="hidden p-4 pt-10 pb-20">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-8 px-2">
            <h2 class="text-2xl font-black italic uppercase"><span id="user-name" class="text-pink-400"></span></h2>
            <button onclick="logout()" class="text-[9px] font-black tracking-widest text-slate-400 underline">THOÁT</button>
        </header>
        <div id="user-global-stats" class="flex gap-3 overflow-x-auto pb-3 mb-6"></div>

        <!-- BEE AI PANEL -->
        <div class="bee-panel p-5 mb-8">
            <div class="flex gap-3 items-start">
                <div class="bee-avatar">🐝</div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-2 flex-wrap">
                        <span class="text-xs font-black text-yellow-300">BEE AI</span>
                        <span class="text-[9px] text-yellow-600 bg-yellow-400/10 px-2 py-0.5 rounded-full border border-yellow-400/20 font-bold">Trợ lý cày acc</span>
                    </div>
                    <div class="bee-bubble" id="bee-message">
                        <div class="bee-typing"><span></span><span></span><span></span></div>
                    </div>
                </div>
            </div>
            <div id="bee-actions" class="hidden mt-4 flex gap-2 flex-wrap">
                <button onclick="beeSortUrgent()" class="text-[10px] font-black px-3 py-2 rounded-xl" style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5"><i class="fa-solid fa-arrow-up-wide-short mr-1"></i>Ưu tiên chưa cày</button>
                <button onclick="beeSortDefault()" class="text-[10px] font-black px-3 py-2 rounded-xl" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#94a3b8"><i class="fa-solid fa-clock-rotate-left mr-1"></i>Mặc định</button>
            </div>
        </div>

        <div class="glass-strong p-7 rounded-[2.5rem] mb-8">
            <div class="mode-toggle mb-5">
                <button class="mode-btn active" id="user-mode-single-btn" onclick="switchUserMode('single')"><i class="fa-solid fa-pen mr-1"></i>Đơn lẻ</button>
                <button class="mode-btn" id="user-mode-bulk-btn" onclick="switchUserMode('bulk')"><i class="fa-solid fa-layer-group mr-1"></i>Hàng loạt</button>
            </div>
            <div id="user-single-mode" class="space-y-3">
                <input type="text" id="acc-tk" placeholder="Tài khoản" class="w-full p-4 rounded-2xl text-sm">
                <input type="text" id="acc-mk" placeholder="Mật khẩu" class="w-full p-4 rounded-2xl text-sm">
                <input type="number" id="acc-lv" placeholder="Level" class="w-full p-4 rounded-2xl text-sm">
                <button onclick="postAcc()" class="w-full btn-rainbow py-4 rounded-2xl text-base uppercase">ĐĂNG ACC MỚI</button>
            </div>
            <div id="user-bulk-mode" class="hidden space-y-3">
                <div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-circle-info text-pink-400 text-xs"></i><span class="text-[10px] text-slate-400">Mỗi dòng: <code class="text-pink-300">tài_khoản|mật_khẩu|level</code></span></div>
                <textarea id="user-bulk-input" rows="7" placeholder="player001|pass123|80&#10;player002|abc456|75" class="w-full p-4 rounded-2xl" oninput="previewBulk('user')"></textarea>
                <div id="user-bulk-preview" class="space-y-1 max-h-40 overflow-y-auto"></div>
                <button onclick="userBulkPost()" class="w-full btn-rainbow py-4 rounded-2xl text-base uppercase"><i class="fa-solid fa-rocket mr-2"></i>ĐĂNG TẤT CẢ</button>
            </div>
        </div>
        <div id="user-list" class="space-y-4"></div>
    </div>
</div>

<script>
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
loadScript('https://cdn.jsdelivr.net/npm/firebase@9.17.1/firebase-app-compat.min.js')
    .then(()=>loadScript('https://cdn.jsdelivr.net/npm/firebase@9.17.1/firebase-database-compat.min.js'))
    .then(bootApp);

function bootApp(){
    const cfg={apiKey:"AIzaSyAAU_3tGfOFXThNgeOfzzaZ1JJsIRXvm9I",authDomain:"cccc-1e4fe.firebaseapp.com",databaseURL:"https://cccc-1e4fe-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"cccc-1e4fe",storageBucket:"cccc-1e4fe.firebasestorage.app",messagingSenderId:"23606175445",appId:"1:23606175445:web:9cb963552b352cf308e45c"};
    firebase.initializeApp(cfg);
    const dbRef=firebase.database().ref('NEBULA_DATA_V5');
    const ADMIN={u:'gbao',p:'031008'};
    let db={users:[],accounts:[]};
    let currentMode='',currentUser=null,sortMode='default';

    dbRef.on('value',snap=>{
        const d=snap.val(),toArr=v=>v?(Array.isArray(v)?v:Object.values(v)):[];
        db.users=toArr(d&&d.users);db.accounts=toArr(d&&d.accounts);
        if(currentMode) renderUI();
    });
    function sync(){return dbRef.set({users:db.users,accounts:db.accounts})}

    /* ── AUTH ── */
    window.login=function(){
        const u=document.getElementById('user').value.trim(),p=document.getElementById('pass').value.trim();
        if(u===ADMIN.u&&p===ADMIN.p){currentMode='admin';showPage('admin-page');renderUI();}
        else{
            const f=db.users.find(x=>x.u===u&&x.p===p);
            if(f){currentMode='user';currentUser=f;document.getElementById('user-name').innerText=u;showPage('user-page');renderUI();setTimeout(runBee,700);}
            else document.getElementById('login-error').classList.remove('hidden');
        }
    };
    window.logout=function(){location.reload()};

    /* ── BEE AI ── */
    function runBee(){
        const my=db.accounts.filter(a=>a.uploader===currentUser.u);
        const chua=my.filter(a=>!a.status||a.status==='chua');
        const dang=my.filter(a=>a.status==='dang');
        const xong=my.filter(a=>a.status==='xong');
        let msg='';
        if(my.length===0){
            msg=`Xin chào <b>${currentUser.u}</b>! 👋 Kho của bạn đang trống. Hãy đăng acc mới để bắt đầu cày nhé!`;
        } else if(chua.length===0){
            msg=`<i class="fa-solid fa-star text-yellow-300 mr-1"></i> Ngon lắm <b>${currentUser.u}</b>! Tất cả <b>${my.length} acc</b> đều đã có trạng thái. ${xong.length?`<span class="text-green-300">✓ ${xong.length} acc hoàn thành!</span>`:''}`;
        } else {
            msg=`Chào <b>${currentUser.u}</b>! Bạn có <b class="text-red-300">${chua.length} acc chưa cày</b> trên tổng ${my.length} acc.<br>`;
            if(dang.length) msg+=`<span class="text-yellow-300">⚡ ${dang.length} đang cày.</span> `;
            if(xong.length) msg+=`<span class="text-green-300">✓ ${xong.length} đã xong.</span><br>`;
            const top=chua.slice(0,3);
            msg+=`<div class="bee-urgent-box"><i class="fa-solid fa-fire text-red-400 mr-1"></i><b class="text-red-300">Cày ngay những acc này:</b><br>`;
            top.forEach((a,i)=>{msg+=`<span class="text-slate-300">${i+1}. <code class="text-pink-300">${a.tk}</code> <span class="text-slate-500">—</span> LV ${a.lv}</span><br>`});
            if(chua.length>3) msg+=`<span class="text-slate-500 text-[10px]">...và ${chua.length-3} acc nữa</span>`;
            msg+=`</div><div class="bee-tip-box"><i class="fa-solid fa-lightbulb text-cyan-400 mr-1"></i>Nhấn <b class="text-cyan-300">"Ưu tiên chưa cày"</b> để đẩy acc đó lên đầu!</div>`;
        }
        const el=document.getElementById('bee-message'),act=document.getElementById('bee-actions');
        setTimeout(()=>{el.innerHTML=msg;if(chua.length>0){act.classList.remove('hidden');act.style.display='flex'}},1300);
    }

    window.beeSortUrgent=function(){
        sortMode='urgent';renderUserList();showToast('🐝 Ưu tiên acc chưa cày lên đầu!');
        document.getElementById('bee-message').innerHTML=`<i class="fa-solid fa-sort-up text-yellow-300 mr-1"></i> Đã sắp xếp! <b class="text-red-300">Acc chưa cày</b> hiện ở đầu danh sách. Cày thôi! 💪`;
    };
    window.beeSortDefault=function(){
        sortMode='default';renderUserList();showToast('Về thứ tự mặc định');
        document.getElementById('bee-message').innerHTML=`Đã về <b class="text-cyan-300">thứ tự mặc định</b> (mới nhất lên đầu).`;
    };

    /* ── STATUS ── */
    window.updateStatus=function(id,val){
        const a=db.accounts.find(x=>x.id===id);if(!a)return;
        a.status=val;sync().then(()=>{showToast('✓ '+stLabel(val));if(currentMode==='user'){renderUserStats();renderUserList();runBee()}});
    };
    function stLabel(s){return s==='dang'?'⚡ Đang cày':s==='xong'?'✅ Hoàn thành':'🔴 Chưa cày'}
    function stCls(s){return s==='dang'?'s-dang':s==='xong'?'s-xong':'s-chua'}
    function stDot(s){return s==='dang'?'dot-dang':s==='xong'?'dot-xong':'dot-chua'}
    function stTxt(s){return s==='dang'?'⚡ Đang cày':s==='xong'?'✅ Xong':'🔴 Chưa cày'}

    /* ── POST ── */
    window.postAcc=function(){
        const tk=document.getElementById('acc-tk').value.trim(),mk=document.getElementById('acc-mk').value.trim(),lv=document.getElementById('acc-lv').value.trim();
        if(!tk||!mk||!lv)return;
        db.accounts.push({id:Date.now(),uploader:currentUser.u,tk,mk,lv:Number(lv),status:'chua'});
        sync().then(()=>{showToast('✓ Đã đăng acc');renderUI();runBee()});
        ['acc-tk','acc-mk','acc-lv'].forEach(i=>document.getElementById(i).value='');
    };
    window.adminPostAcc=function(){
        const tk=document.getElementById('ad-acc-tk').value.trim(),mk=document.getElementById('ad-acc-mk').value.trim(),lv=document.getElementById('ad-acc-lv').value.trim();
        if(!tk||!mk||!lv)return;
        db.accounts.push({id:Date.now(),uploader:'ADMIN',tk,mk,lv:Number(lv),status:'chua'});
        sync().then(()=>showToast('✓ Up acc Root'));
        ['ad-acc-tk','ad-acc-mk','ad-acc-lv'].forEach(i=>document.getElementById(i).value='');
    };

    /* ── BULK ── */
    function parseBulk(raw){
        return raw.split('\n').map((line,i)=>{
            const t=line.trim();if(!t)return null;
            const p=t.split('|');
            if(p.length<3||!p[0]||!p[1]||isNaN(p[2])||p[2]==='')return{ok:false,line:t,index:i+1};
            return{ok:true,tk:p[0].trim(),mk:p[1].trim(),lv:Number(p[2].trim()),index:i+1};
        }).filter(Boolean);
    }
    window.previewBulk=function(who){
        const iid=who==='admin'?'admin-bulk-input':'user-bulk-input',pid=who==='admin'?'admin-bulk-preview':'user-bulk-preview';
        const items=parseBulk(document.getElementById(iid).value);
        const ok=items.filter(i=>i.ok).length,err=items.filter(i=>!i.ok).length;
        const col=who==='admin'?'text-cyan-400':'text-pink-400';
        document.getElementById(pid).innerHTML=items.length===0?'':
            `<div class="text-[10px] mb-2 font-bold"><span class="${col}">${ok} acc hợp lệ</span>${err?`<span class="text-red-400 ml-3">${err} lỗi</span>`:''}</div>`+
            items.slice(0,10).map(x=>x.ok
                ?`<div class="bulk-ok"><i class="fa-solid fa-check text-green-400 text-[9px]"></i><span class="font-mono">${x.tk}</span><span class="lv-badge ml-auto">LV ${x.lv}</span></div>`
                :`<div class="bulk-err"><i class="fa-solid fa-xmark text-[9px]"></i>Dòng ${x.index}: Sai định dạng</div>`
            ).join('')+(items.length>10?`<p class="text-[9px] text-slate-500 text-center mt-1">...và ${items.length-10} dòng khác</p>`:'');
    };
    window.userBulkPost=function(){
        const items=parseBulk(document.getElementById('user-bulk-input').value).filter(i=>i.ok);
        if(!items.length){showToast('✕ Không có acc hợp lệ');return}
        const ts=Date.now();items.forEach((x,i)=>db.accounts.push({id:ts+i,uploader:currentUser.u,tk:x.tk,mk:x.mk,lv:x.lv,status:'chua'}));
        sync().then(()=>{showToast(`✓ Đã đăng ${items.length} acc`);document.getElementById('user-bulk-input').value='';document.getElementById('user-bulk-preview').innerHTML='';renderUI();runBee()});
    };
    window.adminBulkPost=function(){
        const items=parseBulk(document.getElementById('admin-bulk-input').value).filter(i=>i.ok);
        if(!items.length){showToast('✕ Không có acc hợp lệ');return}
        const ts=Date.now();items.forEach((x,i)=>db.accounts.push({id:ts+i,uploader:'ADMIN',tk:x.tk,mk:x.mk,lv:x.lv,status:'chua'}));
        sync().then(()=>{showToast(`✓ Up ${items.length} acc Root`);document.getElementById('admin-bulk-input').value='';document.getElementById('admin-bulk-preview').innerHTML=''});
    };

    /* ── EDIT/DEL ── */
    window.editLv=function(id){
        const a=db.accounts.find(x=>x.id===id);if(!a)return;
        const v=prompt(`Level mới cho [${a.tk}]:`,a.lv);
        if(v===null||v===''||isNaN(v))return;
        a.lv=Number(v);sync().then(()=>showToast('✓ Đã cập nhật LV: '+v));
    };
    window.deleteAcc=function(id){
        if(!confirm('Xác nhận xóa acc?'))return;
        db.accounts=db.accounts.filter(a=>a.id!==id);
        sync().then(()=>{showToast('✕ Đã xoá acc');if(currentMode==='user')runBee()});
    };
    window.addUser=function(){
        const u=document.getElementById('new-u').value.trim(),p=document.getElementById('new-p').value.trim();
        if(!u||!p)return;db.users.push({u,p});sync().then(()=>showToast('✓ Đã cấp tài khoản'));
        document.getElementById('new-u').value='';document.getElementById('new-p').value='';
    };
    window.deleteUser=function(u){
        if(!confirm('Xóa user này?'))return;
        db.users=db.users.filter(x=>x.u!==u);db.accounts=db.accounts.filter(x=>x.uploader!==u);
        sync().then(()=>showToast('✕ Đã xoá user'));
    };
    window.toggleUserAccs=function(u){const el=document.getElementById('ua-'+u);if(el)el.classList.toggle('hidden')};

    /* ── RENDER ── */
    function renderUI(){
        if(currentMode==='admin'){
            renderAdminStats();
            document.getElementById('admin-list-accs').innerHTML=db.accounts.slice().reverse().map(a=>accCard(a,true)).join('');
            document.getElementById('admin-list-users').innerHTML=renderAdminUsers();
        } else {
            renderUserStats();renderUserList();
        }
    }
    function renderUserList(){
        let list=db.accounts.filter(a=>a.uploader===currentUser.u);
        if(sortMode==='urgent'){
            const ord={chua:0,dang:1,xong:2};
            list=list.slice().sort((a,b)=>(ord[a.status||'chua']??0)-(ord[b.status||'chua']??0));
        } else list=list.slice().reverse();
        document.getElementById('user-list').innerHTML=list.map(a=>accCard(a,false)).join('');
    }

    function accCard(a,isAdmin){
        const col=a.uploader==='ADMIN'?'#f97316':'#a855f7';
        const canManage=isAdmin||(currentUser&&a.uploader===currentUser.u);
        const st=a.status||'chua';
        const urgent=!isAdmin&&st==='chua'&&sortMode==='urgent';
        return `
        <div class="acc-wrap">
            ${urgent?`<span class="priority-ribbon">🔥 ƯU TIÊN CÀY</span>`:''}
            <div class="glass p-5 rounded-2xl animate-fade ${urgent?'card-urgent':''}" style="border-left:3px solid ${col}40">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex items-center gap-2 flex-wrap">
                        <span class="lv-badge">LV ${a.lv}</span>
                        <span class="text-[9px] font-bold" style="color:${col}">@${a.uploader}</span>
                        <span class="${stCls(st)} text-[9px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1.5 whitespace-nowrap">
                            <span class="${stDot(st)}"></span>${stTxt(st)}
                        </span>
                    </div>
                    <div class="flex gap-2 flex-shrink-0 ml-2">
                        ${canManage?`<button onclick="editLv(${a.id})" class="btn-edit w-8 h-8 rounded-lg flex items-center justify-center text-xs"><i class="fa-solid fa-pen"></i></button>`:''}
                        ${canManage?`<button onclick="deleteAcc(${a.id})" class="btn-delete w-8 h-8 rounded-lg flex items-center justify-center text-xs"><i class="fa-solid fa-trash"></i></button>`:''}
                    </div>
                </div>
                <div class="space-y-2 mb-3">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 uppercase">Tài khoản: <b class="text-white">${a.tk}</b></span>
                        <button onclick="copyText('${a.tk}')" class="text-gray-500 text-xs ml-2"><i class="fa-solid fa-copy"></i></button>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] text-gray-500 uppercase">Mật khẩu: <b class="text-white">${a.mk}</b></span>
                        <button onclick="copyText('${a.mk}')" class="text-gray-500 text-xs ml-2"><i class="fa-solid fa-copy"></i></button>
                    </div>
                </div>
                ${canManage?`
                <div class="flex gap-1.5 pt-2 border-t border-white/5">
                    <button onclick="updateStatus(${a.id},'chua')" class="flex-1 text-[9px] font-black py-2 rounded-lg transition-all ${st==='chua'?'s-chua':'opacity-25 hover:opacity-60'}" style="${st!=='chua'?'background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.05)':''}">🔴 Chưa</button>
                    <button onclick="updateStatus(${a.id},'dang')" class="flex-1 text-[9px] font-black py-2 rounded-lg transition-all ${st==='dang'?'s-dang':'opacity-25 hover:opacity-60'}" style="${st!=='dang'?'background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.05)':''}">⚡ Đang</button>
                    <button onclick="updateStatus(${a.id},'xong')" class="flex-1 text-[9px] font-black py-2 rounded-lg transition-all ${st==='xong'?'s-xong':'opacity-25 hover:opacity-60'}" style="${st!=='xong'?'background:rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.05)':''}">✅ Xong</button>
                </div>`:''}
            </div>
        </div>`;
    }

    function renderAdminUsers(){
        if(!db.users.length) return '<p class="text-center text-xs text-slate-600 py-8">Chưa có user nào</p>';
        const maxA=Math.max(1,...db.users.map(u=>db.accounts.filter(a=>a.uploader===u.u).length));
        return db.users.slice().reverse().map(u=>{
            const acs=db.accounts.filter(a=>a.uploader===u.u);
            const cnt=acs.length,chua=acs.filter(a=>!a.status||a.status==='chua').length;
            const dang=acs.filter(a=>a.status==='dang').length,xong=acs.filter(a=>a.status==='xong').length;
            const pct=Math.round((cnt/maxA)*100);
            const lvAvg=cnt?Math.round(acs.reduce((s,a)=>s+a.lv,0)/cnt):0,lvMax=cnt?Math.max(...acs.map(a=>a.lv)):0;
            const recent=acs.slice().reverse().slice(0,3);
            return `
            <div class="glass rounded-2xl overflow-hidden animate-fade">
                <div class="p-4">
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-9 h-9 rounded-xl flex items-center justify-center font-black text-sm" style="background:linear-gradient(135deg,rgba(168,85,247,0.2),rgba(0,242,255,0.1));border:1px solid rgba(168,85,247,0.3)">${u.u.charAt(0).toUpperCase()}</div>
                            <div><p class="font-bold text-sm">${u.u}</p><p class="text-[9px] text-slate-500">Pass: ${u.p}</p></div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="toggleUserAccs('${u.u}')" class="btn-edit px-3 py-1.5 rounded-lg text-[10px] font-bold"><i class="fa-solid fa-list mr-1"></i>${cnt}</button>
                            <button onclick="deleteUser('${u.u}')" class="btn-delete px-3 py-1.5 rounded-lg text-[10px] font-bold">XÓA</button>
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-1.5 mb-3">
                        <div class="text-center p-2 rounded-xl" style="background:rgba(0,242,255,0.05);border:1px solid rgba(0,242,255,0.1)"><p class="text-[8px] text-cyan-400 font-bold">TỔNG</p><p class="text-lg font-black text-cyan-300">${cnt}</p></div>
                        <div class="text-center p-2 rounded-xl" style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.15)"><p class="text-[8px] text-red-400 font-bold">CHƯA</p><p class="text-lg font-black text-red-300">${chua}</p></div>
                        <div class="text-center p-2 rounded-xl" style="background:rgba(250,204,21,0.05);border:1px solid rgba(250,204,21,0.1)"><p class="text-[8px] text-yellow-400 font-bold">ĐANG</p><p class="text-lg font-black text-yellow-300">${dang}</p></div>
                        <div class="text-center p-2 rounded-xl" style="background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.15)"><p class="text-[8px] text-green-400 font-bold">XONG</p><p class="text-lg font-black text-green-300">${xong}</p></div>
                    </div>
                    <div class="flex items-center gap-2"><div class="flex-1 h-1.5 rounded-full" style="background:rgba(255,255,255,0.05)"><div class="user-acc-bar" style="width:${pct}%"></div></div><span class="text-[9px] text-slate-500">${pct}%</span></div>
                </div>
                <div id="ua-${u.u}" class="hidden px-4 pb-4 border-t border-white/5 pt-3 space-y-1.5">
                    <p class="text-[9px] font-black uppercase text-slate-500 mb-2 tracking-widest">Acc gần nhất</p>
                    ${recent.length?recent.map(a=>`
                        <div class="flex items-center justify-between gap-2">
                            <div class="flex items-center gap-2 min-w-0 flex-wrap">
                                <span class="lv-badge">LV${a.lv}</span>
                                <span class="acc-mini-tag">${a.tk}</span>
                                <span class="${stCls(a.status||'chua')} text-[9px] px-1.5 py-0.5 rounded-full whitespace-nowrap">${stTxt(a.status||'chua')}</span>
                            </div>
                            <button onclick="deleteAcc(${a.id})" class="text-red-400 text-[10px] opacity-40 hover:opacity-100 flex-shrink-0"><i class="fa-solid fa-trash"></i></button>
                        </div>`).join(''):'<p class="text-[10px] text-slate-600">Chưa có acc</p>'}
                    ${cnt>3?`<p class="text-[9px] text-slate-600 text-center">...và ${cnt-3} acc khác</p>`:''}
                </div>
            </div>`;
        }).join('');
    }

    /* ── STATS ── */
    function renderAdminStats(){
        const chua=db.accounts.filter(a=>!a.status||a.status==='chua').length;
        document.getElementById('admin-global-stats').innerHTML=
            sBox('Tổng Acc',db.accounts.length,'#00f2ff')+sBox('Users',db.users.length,'#a855f7')+
            sBox('Chưa cày',chua,'#ef4444')+sBox('Root',db.accounts.filter(a=>a.uploader==='ADMIN').length,'#f97316');
    }
    function renderUserStats(){
        const my=db.accounts.filter(a=>a.uploader===currentUser.u);
        document.getElementById('user-global-stats').innerHTML=
            sBox('Tổng Kho',db.accounts.length,'#00f2ff')+sBox('Của tôi',my.length,'#ff00e5')+
            sBox('Chưa cày',my.filter(a=>!a.status||a.status==='chua').length,'#ef4444')+
            sBox('Đã xong',my.filter(a=>a.status==='xong').length,'#00ff88');
    }
    function sBox(l,v,c){return`<div class="stat-card p-4 rounded-2xl text-center min-w-[80px]"><p class="text-[9px] font-bold uppercase" style="color:${c}">${l}</p><p class="text-2xl font-black">${v}</p></div>`}

    /* ── HELPERS ── */
    window.copyText=function(t){navigator.clipboard.writeText(t).then(()=>showToast('✓ Đã copy!'))};
    function showPage(id){['login-page','admin-page','user-page'].forEach(p=>document.getElementById(p).classList.toggle('hidden',p!==id))}
    function showToast(m){const t=document.getElementById('toast');t.innerText=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
    window.switchAdminTab=function(tab){
        const ia=tab==='acc';
        ['admin-tab-acc','admin-tab-user'].forEach((id,i)=>document.getElementById(id).classList.toggle('hidden',ia?(i!==0):(i===0)));
        document.getElementById('tab-acc-btn').classList.toggle('tab-active',ia);
        document.getElementById('tab-user-btn').classList.toggle('tab-active',!ia);
    };
    window.switchAdminMode=function(m){
        const is=m==='single';
        document.getElementById('admin-single-mode').classList.toggle('hidden',!is);
        document.getElementById('admin-bulk-mode').classList.toggle('hidden',is);
        document.getElementById('admin-mode-single-btn').classList.toggle('active',is);
        document.getElementById('admin-mode-bulk-btn').classList.toggle('active',!is);
    };
    window.switchUserMode=function(m){
        const is=m==='single';
        document.getElementById('user-single-mode').classList.toggle('hidden',!is);
        document.getElementById('user-bulk-mode').classList.toggle('hidden',is);
        document.getElementById('user-mode-single-btn').classList.toggle('active',is);
        document.getElementById('user-mode-bulk-btn').classList.toggle('active',!is);
    };
}
</script>
</body>
</html>
