<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nebula Vault v5 - Cloud Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- TÍCH HỢP FIREBASE SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff00e5; --neon-yellow: #facc15; }
        body { background: radial-gradient(circle at top right, #1e1b4b, #020617); font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; min-height: 100vh; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .btn-rainbow { background: linear-gradient(45deg, #ff00e5, #9d00ff, #00f2ff, #00ff88); background-size: 300% 300%; animation: gradientMove 5s ease infinite; color: white; border: none; }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .hidden { display: none; }
        .tab-active { border-bottom: 3px solid var(--neon-blue); color: var(--neon-blue); background: linear-gradient(to bottom, transparent, rgba(0, 242, 255, 0.1)); }
        input { background: rgba(0, 0, 0, 0.4) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white; }
        .stat-card { background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(147, 51, 234, 0.1)); border: 1px solid rgba(255, 255, 255, 0.05); }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-page" class="flex items-center justify-center min-h-screen p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[3.5rem] text-center">
            <div class="w-20 h-20 mx-auto bg-gradient-to-tr from-cyan-500 to-purple-600 rounded-3xl flex items-center justify-center mb-6 shadow-2xl rotate-12">
                <i class="fa-solid fa-cloud text-4xl text-white -rotate-12"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tighter uppercase mb-2 italic">NEBULA<span class="text-cyan-400">V5</span></h1>
            <p class="text-[10px] text-slate-500 tracking-[0.3em] mb-8">REALTIME DATABASE ACTIVE</p>
            <div class="space-y-4">
                <input type="text" id="user" placeholder="Username" class="w-full p-4 rounded-2xl outline-none">
                <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl outline-none">
                <button onclick="login()" class="w-full btn-rainbow py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95">VÀO HỆ THỐNG</button>
            </div>
        </div>
    </div>

    <!-- TRANG ADMIN -->
    <div id="admin-page" class="hidden p-4 pt-8">
        <div class="max-w-4xl mx-auto">
            <header class="flex justify-between items-center mb-6 px-4">
                <h2 class="text-2xl font-black text-cyan-400 italic">MASTER <span class="text-white">DASHBOARD</span></h2>
                <button onclick="logout()" class="w-10 h-10 glass rounded-xl flex items-center justify-center text-red-500"><i class="fa-solid fa-power-off"></i></button>
            </header>
            <div id="admin-global-stats" class="flex gap-3 overflow-x-auto pb-4 mb-6"></div>
            
            <div class="flex gap-2 mb-8 p-1 glass rounded-2xl font-bold text-[10px] tracking-widest uppercase">
                <button id="tab-acc-btn" onclick="switchAdminTab('acc')" class="flex-1 py-4 rounded-xl tab-active">Tất cả Acc</button>
                <button id="tab-user-btn" onclick="switchAdminTab('user')" class="flex-1 py-4 rounded-xl">Quản lý User</button>
            </div>

            <div id="admin-tab-acc" class="animate-fade">
                <div class="glass p-6 rounded-[2.5rem] mb-6 border-t-2 border-blue-500/30">
                    <input type="text" id="ad-acc-tk" placeholder="TK Game" class="w-full p-4 mb-3 rounded-xl text-sm">
                    <input type="text" id="ad-acc-mk" placeholder="MK Game" class="w-full p-4 mb-3 rounded-xl text-sm">
                    <input type="number" id="ad-acc-lv" placeholder="LV" class="w-full p-4 mb-4 rounded-xl text-sm">
                    <button onclick="adminPostAcc()" class="w-full btn-rainbow py-4 rounded-xl font-black text-xs uppercase">Up Acc Root</button>
                </div>
                <div id="admin-list-accs" class="space-y-4 pb-24"></div>
            </div>

            <div id="admin-tab-user" class="hidden animate-fade">
                <div class="glass p-6 rounded-[2.5rem] mb-6 border-t-2 border-yellow-500/30">
                    <input type="text" id="new-u" placeholder="Tên User mới" class="w-full p-4 mb-3 rounded-xl text-sm">
                    <input type="text" id="new-p" placeholder="Mật khẩu" class="w-full p-4 mb-3 rounded-xl text-sm">
                    <button onclick="addUser()" class="w-full btn-rainbow p-4 rounded-xl font-black text-xs uppercase">Cấp Tài Khoản</button>
                </div>
                <div id="admin-list-users" class="space-y-3 pb-24"></div>
            </div>
        </div>
    </div>

    <!-- TRANG USER -->
    <div id="user-page" class="hidden p-4 pt-8">
        <div class="max-w-2xl mx-auto">
            <header class="flex justify-between items-center mb-8 px-4">
                <h2 class="text-2xl font-black uppercase italic">NEBULA <span id="user-name" class="text-pink-500"></span></h2>
                <button onclick="logout()" class="text-slate-500 text-[10px] font-black underline">THOÁT</button>
            </header>
            <div id="user-global-stats" class="flex gap-3 overflow-x-auto pb-4 mb-10"></div>
            <div class="glass p-8 rounded-[3rem] mb-10 border-t-2 border-pink-500/20 shadow-2xl">
                <div class="space-y-4">
                    <input type="text" id="acc-tk" placeholder="Tài khoản" class="w-full p-4 rounded-2xl text-sm">
                    <input type="text" id="acc-mk" placeholder="Mật khẩu" class="w-full p-4 rounded-2xl text-sm">
                    <input type="number" id="acc-lv" placeholder="Level" class="w-full p-4 rounded-2xl text-sm">
                    <button onclick="postAcc()" class="w-full btn-rainbow py-5 rounded-2xl font-black text-lg active:scale-95">ĐĂNG ACC MỚI</button>
                </div>
            </div>
            <div id="user-list" class="space-y-4 pb-24"></div>
        </div>
    </div>

    <script>
        // --- 1. CẤU HÌNH FIREBASE (DÁN MÃ CỦA ÔNG VÀO ĐÂY) ---
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const dbRef = firebase.database().ref('NEBULA_DATA_V5');

        // --- 2. BIẾN TOÀN CỤC ---
        let db = { admin: { u: 'gbao', p: '031008' }, users: [], accounts: [] };
        let currentMode = '';
        let currentUser = null;

        // --- 3. ĐỒNG BỘ DỮ LIỆU REALTIME ---
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                db.users = data.users || [];
                db.accounts = data.accounts || [];
                renderUI(); // Tự động vẽ lại giao diện khi có ai đó thay đổi dữ liệu
            }
        });

        function sync() {
            dbRef.set({ users: db.users, accounts: db.accounts });
        }

        // --- 4. LOGIC CHỨC NĂNG ---
        function login() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if (u === db.admin.u && p === db.admin.p) {
                currentMode = 'admin'; showPage('admin-page'); renderUI();
            } else {
                const user = db.users.find(x => x.u === u && x.p === p);
                if (user) {
                    currentMode = 'user'; currentUser = user;
                    document.getElementById('user-name').innerText = u;
                    showPage('user-page'); renderUI();
                } else alert('Sai tài khoản hoặc mật khẩu!');
            }
        }

        function postAcc() {
            const tk = document.getElementById('acc-tk').value.trim();
            const mk = document.getElementById('acc-mk').value.trim();
            const lv = document.getElementById('acc-lv').value.trim();
            if(!tk || !mk || !lv) return;
            db.accounts.push({ id: Date.now(), uploader: currentUser.u, tk, mk, lv });
            sync();
            document.querySelectorAll('#user-page input').forEach(i => i.value = '');
        }

        function adminPostAcc() {
            const tk = document.getElementById('ad-acc-tk').value.trim();
            const mk = document.getElementById('ad-acc-mk').value.trim();
            const lv = document.getElementById('ad-acc-lv').value.trim();
            if(!tk || !mk || !lv) return;
            db.accounts.push({ id: Date.now(), uploader: 'ADMIN', tk, mk, lv });
            sync();
            document.querySelectorAll('#admin-tab-acc input').forEach(i => i.value = '');
        }

        function addUser() {
            const u = document.getElementById('new-u').value.trim();
            const p = document.getElementById('new-p').value.trim();
            if(!u || !p) return;
            db.users.push({ u, p });
            sync();
            document.getElementById('new-u').value = ''; document.getElementById('new-p').value = '';
        }

        function deleteAcc(id) {
            if(confirm('Xóa?')) {
                db.accounts = db.accounts.filter(a => a.id !== id);
                sync();
            }
        }

        function deleteUser(uName) {
            if(confirm('Xóa User và mọi Acc liên quan?')) {
                db.users = db.users.filter(x => x.u !== uName);
                db.accounts = db.accounts.filter(x => x.uploader !== uName);
                sync();
            }
        }

        // --- 5. HIỂN THỊ (RENDER) ---
        function renderUI() {
            if(currentMode === 'admin') {
                renderStats('admin-global-stats');
                renderAdminAccs();
                renderAdminUsers();
            } else if(currentMode === 'user') {
                renderStats('user-global-stats');
                renderUserAccs();
            }
        }

        function renderStats(id) {
            const container = document.getElementById(id);
            const stats = [{ name: 'ADMIN', count: db.accounts.filter(a => a.uploader === 'ADMIN').length }];
            db.users.forEach(u => stats.push({ name: u.u, count: db.accounts.filter(a => a.uploader === u.u).length }));
            stats.sort((a,b) => b.count - a.count);
            container.innerHTML = stats.map((s, i) => `
                <div class="stat-card min-w-[100px] p-4 rounded-2xl text-center animate-fade">
                    <div class="text-[10px] font-black uppercase ${s.name==='ADMIN'?'text-yellow-400':'text-cyan-400'}">${s.name}</div>
                    <div class="text-xl font-black mt-1">${s.count}</div>
                </div>
            `).join('');
        }

        function renderAdminAccs() {
            const container = document.getElementById('admin-list-accs');
            container.innerHTML = db.accounts.map(acc => `
                <div class="glass p-5 rounded-[2rem] flex justify-between items-center border-l-4 border-blue-500 animate-fade">
                    <div>
                        <div class="text-[9px] font-black text-slate-500">UP: ${acc.uploader}</div>
                        <div class="font-bold text-white text-lg">${acc.tk}</div>
                        <div class="text-xs text-slate-500 font-mono">Pass: ${acc.mk}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl font-black italic">LV.${acc.lv}</div>
                        <button onclick="deleteAcc(${acc.id})" class="text-red-500/30 mt-2"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).reverse().join('');
        }

        function renderUserAccs() {
            const container = document.getElementById('user-list');
            const myAccs = db.accounts.filter(a => a.uploader === currentUser.u);
            container.innerHTML = myAccs.map(acc => `
                <div class="glass p-6 rounded-[2.5rem] flex justify-between items-center border-l-4 border-pink-500 animate-fade">
                    <div><div class="font-bold text-pink-400 text-lg">${acc.tk}</div><div class="text-xs text-slate-500">Pass: ${acc.mk}</div></div>
                    <div class="text-2xl font-black italic">LV.${acc.lv}</div>
                </div>
            `).reverse().join('');
        }

        function renderAdminUsers() {
            const container = document.getElementById('admin-list-users');
            container.innerHTML = db.users.map(u => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-yellow-500">
                    <div><div class="font-black text-white text-sm uppercase">${u.u}</div><div class="text-[10px] text-slate-500">Pass: ${u.p}</div></div>
                    <button onclick="deleteUser('${u.u}')" class="text-red-500 font-bold text-[10px]">XÓA</button>
                </div>
            `).reverse().join('');
        }

        function showPage(id) {
            ['login-page', 'admin-page', 'user-page'].forEach(p => document.getElementById(p).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function switchAdminTab(type) {
            document.getElementById('admin-tab-acc').classList.toggle('hidden', type !== 'acc');
            document.getElementById('admin-tab-user').classList.toggle('hidden', type !== 'user');
            document.getElementById('tab-acc-btn').classList.toggle('tab-active', type === 'acc');
            document.getElementById('tab-user-btn').classList.toggle('tab-active', type === 'user');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
