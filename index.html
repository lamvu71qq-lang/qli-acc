<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nebula Vault v5 - Edit Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>
    :root { --neon-blue: #00f2ff; --neon-pink: #ff00e5; --neon-yellow: #facc15; }
    * { box-sizing: border-box; }
    body {
        background: radial-gradient(ellipse at top right, #1e1b4b 0%, #0a0a1a 60%, #020617 100%);
        font-family: 'Segoe UI', system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        min-height: 100vh; color: white; overflow-x: hidden;
    }
    .glass {
        background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .glass-strong {
        background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
        border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .btn-rainbow {
        background: linear-gradient(135deg, #ff00e5, #9d00ff, #00f2ff, #00ff88);
        background-size: 300% 300%; animation: gradientMove 4s ease infinite;
        font-weight: 900; transition: transform 0.1s; box-shadow: 0 4px 24px rgba(0,242,255,0.25);
    }
    .btn-rainbow:active { transform: scale(0.97); }
    @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .hidden { display: none !important; }
    .tab-active { border-bottom: 3px solid var(--neon-blue); color: var(--neon-blue); background: linear-gradient(to bottom, transparent, rgba(0,242,255,0.12)); }
    input { background: rgba(0, 0, 0, 0.5) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; outline: none !important; }
    .stat-card { background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(147,51,234,0.08)); border: 1px solid rgba(255, 255, 255, 0.06); flex-shrink: 0; }
    .animate-fade { animation: fadeUp 0.35s ease forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
        background: rgba(0,242,255,0.15); border: 1px solid rgba(0,242,255,0.4); color: #00f2ff;
        padding: 12px 24px; border-radius: 100px; font-size: 13px; font-weight: 700; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 9999;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .lv-badge { background: linear-gradient(135deg, #facc15, #f97316); color: #1a0a00; font-weight: 900; font-size: 10px; padding: 2px 8px; border-radius: 100px; }
    .btn-delete { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }
    .btn-edit { background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); color: #00f2ff; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- LOGIN PAGE -->
<div id="login-page" class="flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-sm glass-strong p-10 rounded-[3rem] text-center">
        <h1 class="text-5xl font-black italic mb-2 tracking-tighter">NEBULA<span class="text-cyan-400">V5</span></h1>
        <p class="text-[9px] text-slate-500 tracking-[0.35em] mb-10 uppercase">Cloud Database System</p>
        <div class="space-y-3">
            <input type="text" id="user" placeholder="Username" class="w-full p-4 rounded-2xl text-sm">
            <input type="password" id="pass" placeholder="Password" class="w-full p-4 rounded-2xl text-sm">
            <button onclick="login()" class="w-full btn-rainbow py-4 rounded-2xl text-base mt-2 uppercase">VÀO HỆ THỐNG</button>
        </div>
        <p id="login-error" class="hidden mt-4 text-xs text-red-400 font-bold">✕ Sai thông tin đăng nhập</p>
    </div>
</div>

<!-- ADMIN PAGE -->
<div id="admin-page" class="hidden p-4 pt-10 pb-20">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-8 px-2">
            <h2 class="text-2xl font-black italic">MASTER <span class="text-cyan-400">ADMIN</span></h2>
            <button onclick="logout()" class="w-11 h-11 glass rounded-xl text-red-400"><i class="fa-solid fa-power-off"></i></button>
        </header>
        <div id="admin-global-stats" class="flex gap-3 overflow-x-auto pb-3 mb-8"></div>
        <div class="flex gap-1 mb-8 p-1 glass rounded-2xl text-[10px] font-black uppercase">
            <button id="tab-acc-btn" onclick="switchAdminTab('acc')" class="flex-1 py-3.5 rounded-xl tab-active">Tất cả Acc</button>
            <button id="tab-user-btn" onclick="switchAdminTab('user')" class="flex-1 py-3.5 rounded-xl">Quản lý User</button>
        </div>
        <div id="admin-tab-acc" class="animate-fade">
            <div class="glass p-6 rounded-[2rem] mb-6">
                <div class="space-y-3">
                    <input type="text" id="ad-acc-tk" placeholder="Tài khoản game" class="w-full p-3.5 rounded-xl text-sm">
                    <input type="text" id="ad-acc-mk" placeholder="Mật khẩu game" class="w-full p-3.5 rounded-xl text-sm">
                    <input type="number" id="ad-acc-lv" placeholder="Level" class="w-full p-3.5 rounded-xl text-sm">
                    <button onclick="adminPostAcc()" class="w-full btn-rainbow py-3.5 rounded-xl text-sm uppercase">Up Acc Root</button>
                </div>
            </div>
            <div id="admin-list-accs" class="space-y-3"></div>
        </div>
        <div id="admin-tab-user" class="hidden animate-fade">
            <div class="glass p-6 rounded-[2rem] mb-6">
                <div class="space-y-3">
                    <input type="text" id="new-u" placeholder="Tên User" class="w-full p-3.5 rounded-xl text-sm">
                    <input type="text" id="new-p" placeholder="Mật khẩu" class="w-full p-3.5 rounded-xl text-sm">
                    <button onclick="addUser()" class="w-full btn-rainbow py-3.5 rounded-xl text-sm uppercase">Cấp Tài Khoản</button>
                </div>
            </div>
            <div id="admin-list-users" class="space-y-3"></div>
        </div>
    </div>
</div>

<!-- USER PAGE -->
<div id="user-page" class="hidden p-4 pt-10 pb-20">
    <div class="max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-8 px-2">
            <h2 class="text-2xl font-black italic uppercase"><span id="user-name" class="text-pink-400"></span></h2>
            <button onclick="logout()" class="text-[9px] font-black tracking-widest text-slate-400 underline">THOÁT</button>
        </header>
        <div id="user-global-stats" class="flex gap-3 overflow-x-auto pb-3 mb-8"></div>
        <div class="glass-strong p-7 rounded-[2.5rem] mb-8">
            <div class="space-y-3">
                <input type="text" id="acc-tk" placeholder="Tài khoản" class="w-full p-4 rounded-2xl text-sm">
                <input type="text" id="acc-mk" placeholder="Mật khẩu" class="w-full p-4 rounded-2xl text-sm">
                <input type="number" id="acc-lv" placeholder="Level" class="w-full p-4 rounded-2xl text-sm">
                <button onclick="postAcc()" class="w-full btn-rainbow py-4 rounded-2xl text-base uppercase">ĐĂNG ACC MỚI</button>
            </div>
        </div>
        <div id="user-list" class="space-y-3"></div>
    </div>
</div>

<script>
function loadScript(src) {
    return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
    });
}

loadScript('https://cdn.jsdelivr.net/npm/firebase@9.17.1/firebase-app-compat.min.js')
    .then(() => loadScript('https://cdn.jsdelivr.net/npm/firebase@9.17.1/firebase-database-compat.min.js'))
    .then(bootApp);

function bootApp() {
    const firebaseConfig = {
        apiKey: "AIzaSyAAU_3tGfOFXThNgeOfzzaZ1JJsIRXvm9I",
        authDomain: "cccc-1e4fe.firebaseapp.com",
        databaseURL: "https://cccc-1e4fe-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "cccc-1e4fe",
        storageBucket: "cccc-1e4fe.firebasestorage.app",
        messagingSenderId: "23606175445",
        appId: "1:23606175445:web:9cb963552b352cf308e45c"
    };

    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('NEBULA_DATA_V5');

    const ADMIN = { u: 'gbao', p: '031008' };
    let db = { users: [], accounts: [] };
    let currentMode = '';
    let currentUser = null;

    dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        const toArr = v => v ? (Array.isArray(v) ? v : Object.values(v)) : [];
        db.users = toArr(data && data.users);
        db.accounts = toArr(data && data.accounts);
        if (currentMode) renderUI();
    });

    function sync() { return dbRef.set({ users: db.users, accounts: db.accounts }); }

    window.login = function() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        if (u === ADMIN.u && p === ADMIN.p) {
            currentMode = 'admin'; showPage('admin-page'); renderUI();
        } else {
            const user = db.users.find(x => x.u === u && x.p === p);
            if (user) {
                currentMode = 'user'; currentUser = user;
                document.getElementById('user-name').innerText = u;
                showPage('user-page'); renderUI();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
    };

    window.logout = function() { location.reload(); };

    window.postAcc = function() {
        const tk = document.getElementById('acc-tk').value.trim();
        const mk = document.getElementById('acc-mk').value.trim();
        const lv = document.getElementById('acc-lv').value.trim();
        if (!tk || !mk || !lv) return;
        db.accounts.push({ id: Date.now(), uploader: currentUser.u, tk, mk, lv: Number(lv) });
        sync().then(() => { showToast('✓ Đã đăng acc'); renderUI(); });
        ['acc-tk','acc-mk','acc-lv'].forEach(id => document.getElementById(id).value = '');
    };

    window.adminPostAcc = function() {
        const tk = document.getElementById('ad-acc-tk').value.trim();
        const mk = document.getElementById('ad-acc-mk').value.trim();
        const lv = document.getElementById('ad-acc-lv').value.trim();
        if (!tk || !mk || !lv) return;
        db.accounts.push({ id: Date.now(), uploader: 'ADMIN', tk, mk, lv: Number(lv) });
        sync().then(() => showToast('✓ Up acc Root thành công'));
        ['ad-acc-tk','ad-acc-mk','ad-acc-lv'].forEach(id => document.getElementById(id).value = '');
    };

    // --- TÍNH NĂNG MỚI: CHỈNH SỬA LEVEL ---
    window.editLv = function(id) {
        const acc = db.accounts.find(a => a.id === id);
        if (!acc) return;
        const newLv = prompt(`Nhập Level mới cho [${acc.tk}]:`, acc.lv);
        if (newLv === null || newLv === "" || isNaN(newLv)) return;
        acc.lv = Number(newLv);
        sync().then(() => showToast('✓ Đã cập nhật LV: ' + newLv));
    };

    window.deleteAcc = function(id) {
        if(!confirm('Xác nhận xóa acc này?')) return;
        db.accounts = db.accounts.filter(a => a.id !== id);
        sync().then(() => showToast('✕ Đã xoá acc'));
    };

    window.addUser = function() {
        const u = document.getElementById('new-u').value.trim();
        const p = document.getElementById('new-p').value.trim();
        if (!u || !p) return;
        db.users.push({ u, p });
        sync().then(() => showToast('✓ Đã cấp tài khoản'));
        document.getElementById('new-u').value = ''; document.getElementById('new-p').value = '';
    };

    window.deleteUser = function(u) {
        if(!confirm('Xóa user này?')) return;
        db.users = db.users.filter(x => x.u !== u);
        db.accounts = db.accounts.filter(x => x.uploader !== u);
        sync().then(() => showToast('✕ Đã xoá user'));
    };

    function renderUI() {
        if (currentMode === 'admin') {
            renderAdminStats();
            document.getElementById('admin-list-accs').innerHTML = db.accounts.slice().reverse().map(a => accCard(a, true)).join('');
            document.getElementById('admin-list-users').innerHTML = db.users.slice().reverse().map(userCard).join('');
        } else {
            renderUserStats();
            const myAccs = db.accounts.filter(a => a.uploader === currentUser.u);
            document.getElementById('user-list').innerHTML = myAccs.slice().reverse().map(a => accCard(a, false)).join('');
        }
    }

    function accCard(a, isAdmin) {
        const col = a.uploader === 'ADMIN' ? '#f97316' : '#a855f7';
        const canManage = isAdmin || (currentUser && a.uploader === currentUser.u);
        return `
            <div class="glass p-5 rounded-2xl animate-fade" style="border-left:3px solid ${col}40">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex items-center gap-2">
                        <span class="lv-badge">LV ${a.lv}</span>
                        <span class="text-[9px] font-bold" style="color:${col}">@${a.uploader}</span>
                    </div>
                    <div class="flex gap-2">
                        ${canManage ? `<button onclick="editLv(${a.id})" class="btn-edit w-8 h-8 rounded-lg flex items-center justify-center text-xs"><i class="fa-solid fa-pen"></i></button>` : ''}
                        ${canManage ? `<button onclick="deleteAcc(${a.id})" class="btn-delete w-8 h-8 rounded-lg flex items-center justify-center text-xs"><i class="fa-solid fa-trash"></i></button>` : ''}
                    </div>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between">
                        <span class="text-[10px] text-gray-500 uppercase">Tài khoản: <b>${a.tk}</b></span>
                        <button onclick="copyText('${a.tk}')" class="text-gray-500 text-xs"><i class="fa-solid fa-copy"></i></button>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-[10px] text-gray-500 uppercase">Mật khẩu: <b>${a.mk}</b></span>
                        <button onclick="copyText('${a.mk}')" class="text-gray-500 text-xs"><i class="fa-solid fa-copy"></i></button>
                    </div>
                </div>
            </div>`;
    }

    function userCard(u) {
        return `
            <div class="glass p-4 rounded-xl flex justify-between items-center">
                <div><p class="font-bold text-sm">${u.u}</p><p class="text-[10px] text-gray-500">Pass: ${u.p}</p></div>
                <button onclick="deleteUser('${u.u}')" class="btn-delete px-3 py-1 rounded-lg text-[10px] font-bold">XÓA</button>
            </div>`;
    }

    function renderAdminStats() {
        document.getElementById('admin-global-stats').innerHTML = 
            statBox('Acc', db.accounts.length, '#00f2ff') + statBox('Users', db.users.length, '#a855f7');
    }
    function renderUserStats() {
        const myAccs = db.accounts.filter(a => a.uploader === currentUser.u);
        document.getElementById('user-global-stats').innerHTML = 
            statBox('Tổng Kho', db.accounts.length, '#00f2ff') + statBox('Của tôi', myAccs.length, '#ff00e5');
    }
    function statBox(lbl, val, col) {
        return `<div class="stat-card p-4 rounded-2xl text-center min-w-[100px]"><p class="text-[9px] font-bold uppercase" style="color:${col}">${lbl}</p><p class="text-2xl font-black">${val}</p></div>`;
    }

    window.copyText = function(t) { navigator.clipboard.writeText(t).then(() => showToast('✓ Đã copy!')); };
    function showPage(id) {
        ['login-page','admin-page','user-page'].forEach(p => document.getElementById(p).classList.toggle('hidden', p !== id));
    }
    function showToast(m) {
        const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }
    window.switchAdminTab = function(tab) {
        const isAcc = tab === 'acc';
        document.getElementById('admin-tab-acc').classList.toggle('hidden', !isAcc);
        document.getElementById('admin-tab-user').classList.toggle('hidden', isAcc);
        document.getElementById('tab-acc-btn').classList.toggle('tab-active', isAcc);
        document.getElementById('tab-user-btn').classList.toggle('tab-active', !isAcc);
    };
}
</script>
</body>
</html>
